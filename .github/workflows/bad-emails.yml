name: Find Bad Emails

on:
  workflow_dispatch:
    inputs:
      start:
        description: "First month to scan, format YYYY-MM"
        default: "2025-08"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run scan
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          START: ${{ inputs.start }}
        run: node bad-email-finder.js
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: bad-emails
          path: bad-emails.csv
